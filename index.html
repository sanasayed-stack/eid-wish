<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Eid ul Fitr Wishes</title>
<style>
:root {
  --pink1: #ffd9ec;
  --pink2: #ffb7d5;
  --pink3: #ff8fc2;
  --pink-deep: #ff5aa8;
  --gold: #f7dca2;
  --shadow: rgba(255, 143, 194, 0.45);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: radial-gradient(circle at 20% 20%, #ffe5f3 0 25%, transparent 40%),
              radial-gradient(circle at 80% 10%, #ffd1e7 0 18%, transparent 35%),
              linear-gradient(135deg, var(--pink1), var(--pink2));
  overflow: hidden;
  font-family: "Quicksand", "Segoe UI", sans-serif;
  color: #7c3b58;
}

/* Card */
.card {
  position: relative;
  width: min(900px, 90vw);
  padding: 48px 42px 60px;
  border-radius: 30px;
  background: rgba(255, 255, 255, 0.78);
  box-shadow: 0 30px 70px var(--shadow);
  overflow: hidden;
}

/* Sparkle veil */
.card::before, .card::after {
  content: "";
  position: absolute;
  inset: -30%;
  background:
    radial-gradient(circle, rgba(255,255,255,0.7) 0 6px, transparent 9px),
    radial-gradient(circle, rgba(255,255,255,0.9) 0 4px, transparent 7px),
    radial-gradient(circle, rgba(255,255,255,0.6) 0 5px, transparent 8px);
  background-size: 180px 180px, 140px 140px, 200px 200px;
  animation: drift 18s linear infinite;
  pointer-events: none;
}
.card::after { animation-duration: 26s; animation-direction: reverse; opacity: 0.6; }

@keyframes drift { to { transform: translate3d(40px, -30px, 0); } }

/* Greeting text */
.greeting {
  text-align: center;
  margin: 0 0 18px;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.6px;
  color: #ff4f9e;
  text-shadow: 0 0 12px rgba(255, 98, 173, 0.35);
}
.greeting .space { padding: 0 14px; }

.sub {
  text-align: center;
  font-size: 18px;
  margin: 10px 0 28px;
}

/* ASCII accent */
.ascii {
  font-family: "Fira Code", "Consolas", monospace;
  white-space: pre;
  text-align: center;
  color: #ff62ad;
  text-shadow: 0 0 12px rgba(255, 98, 173, 0.5);
  margin: 0 0 16px;
}

/* Lanterns */
.lanterns {
  position: relative;
  display: flex;
  justify-content: center;
  gap: 80px;
  margin: 10px 0 22px;
}
.lantern {
  position: relative;
  width: 58px;
  height: 88px;
  background: linear-gradient(#ffb7d5, #ff8fc2);
  border-radius: 28px 28px 20px 20px;
  box-shadow: 0 10px 18px var(--shadow), inset 0 -6px 12px rgba(0,0,0,0.08);
  animation: sway 6s ease-in-out infinite;
}
.lantern:nth-child(2) { animation-duration: 7.5s; }
.lantern::before {
  content: "";
  position: absolute; left: 10px; right: 10px; top: -12px; height: 10px;
  background: linear-gradient(90deg, #ffe7f4, #ff8fc2);
  border-radius: 999px;
}
.lantern::after {
  content: "";
  position: absolute; left: 50%; transform: translateX(-50%);
  bottom: -20px; width: 4px; height: 26px;
  background: linear-gradient(var(--gold), #ff8fc2);
  box-shadow: 0 0 6px rgba(247, 220, 162, 0.7);
}
.lantern .glow {
  position: absolute; inset: 16px;
  background: radial-gradient(circle at 50% 35%, #fff7d9, rgba(255,255,255,0) 60%);
  filter: blur(1px);
}

@keyframes sway {
  0%,100% { transform: rotate(-4deg) translateY(0); }
  50% { transform: rotate(5deg) translateY(4px); }
}

/* Floating flowers */
.flowers {
  position: absolute; inset: 0; pointer-events: none;
}
.flower {
  position: absolute;
  width: 32px; height: 32px;
  background:
    radial-gradient(circle, #fff 0 35%, transparent 40%),
    conic-gradient(from 0deg, #ffb7d5 0 20%, transparent 20% 40%, #ff8fc2 40% 60%, transparent 60% 80%, #ffc9e7 80% 100%);
  border-radius: 50%;
  filter: drop-shadow(0 4px 8px rgba(255, 143, 194, 0.4));
  animation: float 14s ease-in-out infinite;
  opacity: 0.85;
}
.flower:nth-child(2) { top: 10%; left: 18%; animation-duration: 16s; }
.flower:nth-child(3) { top: 70%; left: 12%; animation-duration: 18s; }
.flower:nth-child(4) { top: 25%; left: 82%; animation-duration: 20s; }
.flower:nth-child(5) { top: 78%; left: 70%; animation-duration: 17s; }

@keyframes float {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-16px) rotate(12deg); }
}

/* Coquette bow field */
.bows {
  position: absolute; inset: 0; pointer-events: none;
}
.bow {
  position: absolute;
  width: 42px; height: 28px;
  background:
    radial-gradient(ellipse at 30% 50%, #ff9bca 0 50%, transparent 60%),
    radial-gradient(ellipse at 70% 50%, #ff7fb9 0 50%, transparent 60%),
    radial-gradient(circle, #ffe5f3 0 55%, transparent 60%);
  background-repeat: no-repeat;
  background-size: 50% 100%, 50% 100%, 38% 38%;
  background-position: 0 0, 100% 0, 50% 50%;
  border-radius: 16px;
  filter: drop-shadow(0 4px 10px rgba(255, 122, 184, 0.45));
  animation: bob 11s ease-in-out infinite;
  opacity: 0.9;
}
.bow.small { transform: scale(0.7); animation-duration: 9s; }
.bow.big { transform: scale(1.2); animation-duration: 13s; }
.bow:nth-child(1) { top: 8%; left: 12%; }
.bow:nth-child(2) { top: 18%; left: 78%; }
.bow:nth-child(3) { top: 64%; left: 8%; }
.bow:nth-child(4) { top: 72%; left: 82%; }
.bow:nth-child(5) { top: 40%; left: 48%; }

@keyframes bob {
  0%,100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-10px) scale(1.02); }
}

/* Button */
button {
  display: block;
  margin: 18px auto 0;
  padding: 14px 30px;
  border-radius: 999px;
  border: none;
  background:
    radial-gradient(circle at 20% 40%, rgba(255, 255, 255, 0.6) 0 18%, transparent 30%),
    radial-gradient(circle at 80% 60%, rgba(255, 255, 255, 0.6) 0 18%, transparent 30%),
    repeating-linear-gradient(135deg, #d13d80 0 14px, #e22b77 14px 28px, #b9266b 28px 42px);
  color: #fff;
  font-size: 16px;
  letter-spacing: 0.5px;
  cursor: pointer;
  box-shadow: 0 8px 20px var(--shadow), 0 0 0 0 rgba(255, 143, 194, 0.35);
  transition: transform 0.2s ease, box-shadow 0.4s ease;
}
button:hover { transform: translateY(-2px); box-shadow: 0 10px 24px var(--shadow), 0 0 12px rgba(224, 57, 132, 0.5); }
button:active { transform: translateY(0); }

/* Glitter overlay */
.glitter {
  position: absolute; inset: -10%;
  background:
    radial-gradient(circle, rgba(255,255,255,0.55) 0 2px, transparent 3px),
    radial-gradient(circle, rgba(255,255,255,0.35) 0 1px, transparent 2px);
  background-size: 110px 110px, 90px 90px;
  mix-blend-mode: screen;
  animation: twinkle 9s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes twinkle { from { opacity: 0.55; } to { opacity: 0.9; } }
</style>
</head>
<body>
  <div class="card">
    <div class="flowers">
      <div class="flower" style="top:8%; left:55%;"></div>
      <div class="flower"></div><div class="flower"></div><div class="flower"></div><div class="flower"></div>
    </div>
    <div class="bows">
      <div class="bow small"></div>
      <div class="bow big"></div>
      <div class="bow"></div>
      <div class="bow small"></div>
      <div class="bow big"></div>
    </div>

    <div class="greeting">
      <span>السلام عليكم</span>
      <span class="space">·</span>
      <span>EID MUBARAK</span>
    </div>

    <p class="sub"><strong>May this Eid bring peace, happiness, and countless blessings to your life.</strong></p>

    <pre class="ascii">

    </pre>

    <div class="lanterns">
      <div class="lantern"><div class="glow"></div></div>
      <div class="lantern"><div class="glow"></div></div>
      <div class="lantern"><div class="glow"></div></div>
    </div>

    <button onclick="sendWish()">Send Salam/Eid Wish to Sana 🎀</button>
    <div class="glitter"></div>
  </div>

<script>
function sendWish() {
  alert("A soft Eid wish and salam has been sent to Sana! 🌸");
}
</script>
</body>
</html>
